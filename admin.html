<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Financeiro - Ateliê</title>
    
    <link rel="icon" type="image/x-icon" href="vovodinha_atelie_logo.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- SheetJS para exportar Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="styleAdmin.css">
    <style>
        .btn-relatorio {
            background-color: #d798f0;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(142, 68, 173, 0.3);
            transition: background-color 0.3s;
        }
        .btn-relatorio:hover { background-color: #732d91; }

        .relatorio-container { margin-bottom: 30px; }

        /* Botões de ação lado a lado */
        .acoes-container {
            display: flex;
            gap: 14px;
            margin-bottom: 30px;
        }
        .acoes-container .btn-relatorio { flex: 1; }

        /* Botão exportar Excel */
        .btn-excel {
            flex: 1;
            background-color: #1e7e45;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(30,126,69,0.3);
            transition: background-color 0.3s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-excel:hover { background-color: #166034; }
        .btn-excel:active { transform: scale(0.98); }

        .modal-relatorio {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            text-align: center;
        }
        .modal-content h2 { color: #8e44ad; margin-bottom: 5px; }
        .resumo-item { margin: 15px 0; font-size: 18px; border-bottom: 1px dashed #ddd; padding-bottom: 10px; }
        .lucro-final { font-size: 20px; font-weight: bold; margin-top: 20px; padding: 15px; border-radius: 10px; }

        /* Botão de excluir na tabela */
        .btn-excluir {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            opacity: .55;
            transition: opacity .15s, transform .15s;
            padding: 3px;
        }
        .btn-excluir:hover { opacity: 1; transform: scale(1.2); }

        @media (max-width: 600px) {
            .acoes-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Painel Financeiro</h1>
        <button class="logout-btn" onclick="voltarMenu()" style="margin-right:8px">← Menu</button><button class="logout-btn" onclick="sairDoSistema()">Sair</button>
    </header>

    <div class="summary-cards">
        <div class="card">
            <h3>Total de Entradas</h3>
            <div class="amount text-green" id="totalEntradas">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Total de Saídas</h3>
            <div class="amount text-red" id="totalSaidas">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Saldo Geral</h3>
            <div class="amount text-blue" id="saldoAtual">R$ 0,00</div>
        </div>
    </div>

    <!-- Botões de ação -->
    <div class="acoes-container">
        <button class="btn-relatorio" onclick="abrirRelatorio()">📊 Ver Médias do Mês e Lucratividade</button>
        <button class="btn-excel" onclick="exportarExcel()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8.5 15.5l1.5-2.2 1.5 2.2h1.8l-2.3-3.3 2.2-3.2h-1.8L10 11.1 8.5 8.9H6.7l2.2 3.2-2.3 3.3h1.9z"/>
            </svg>
            Baixar Extrato Excel
        </button>
    </div>

    <div class="form-section">
        <h2>Novo Lançamento</h2>
        <form id="financeForm">
            <div class="form-group">
                <input type="date" id="dataInput" class="input-flex" required>
                <input type="text" id="descInput" placeholder="Descrição (Ex: Venda de Toalha)" class="input-flex" style="flex: 2;" required>
                <select id="tipoInput" class="input-flex" required>
                    <option value="" disabled selected>Selecione o Tipo</option>
                    <option value="entrada">Entrada (Venda)</option>
                    <option value="saida">Saída (Gasto)</option>
                </select>
                <input type="number" id="valorInput" step="0.01" placeholder="Valor (R$)" class="input-flex" required>
            </div>
            <button type="submit" class="btn-submit">Registrar Movimentação</button>
        </form>
    </div>

    <div class="table-section">
        <h2>Histórico Recente</h2>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Tipo</th>
                    <th>Valor</th>
                    <th style="width:40px"></th>
                </tr>
            </thead>
            <tbody id="tabelaHistorico"></tbody>
        </table>
    </div>
</div>

<!-- Modal de relatório -->
<div id="meuModal" class="modal-relatorio">
    <div class="modal-content">
        <h2>Desempenho Médio 🌸</h2>
        <div id="conteudoRelatorio"></div>
        <button class="btn-submit" onclick="fecharRelatorio()" style="background-color: #333; margin-top: 20px;">Fechar</button>
    </div>
</div>

<script>
    // ─── PROTEÇÃO DE SESSÃO ───────────────────────
    // Redireciona para o login se não estiver autenticado
    if (sessionStorage.getItem('adminLogado') !== 'true') {
        window.location.replace('login.html');
    }

    function voltarMenu() { window.location.href = 'dashboard.html'; }
    function sairDoSistema() {
        sessionStorage.removeItem('adminLogado');
        window.location.href = 'login.html';
    }

    // ─── DADOS DO LOCALSTORAGE ────────────────────
    let totalEntradas     = parseFloat(localStorage.getItem('entradasSalvas')) || 0;
    let totalSaidas       = parseFloat(localStorage.getItem('saidasSalvas'))   || 0;
    let listaMovimentacoes = JSON.parse(localStorage.getItem('listaSalva'))     || [];

    const form            = document.getElementById('financeForm');
    const dataInput       = document.getElementById('dataInput');
    const descInput       = document.getElementById('descInput');
    const tipoInput       = document.getElementById('tipoInput');
    const valorInput      = document.getElementById('valorInput');
    const displayEntradas = document.getElementById('totalEntradas');
    const displaySaidas   = document.getElementById('totalSaidas');
    const displaySaldo    = document.getElementById('saldoAtual');
    const tabelaHistorico = document.getElementById('tabelaHistorico');

    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function formatarData(data) {
        const partes = data.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function atualizarPainel() {
        displayEntradas.textContent = formatarMoeda(totalEntradas);
        displaySaidas.textContent   = formatarMoeda(totalSaidas);
        const saldo = totalEntradas - totalSaidas;
        displaySaldo.textContent    = formatarMoeda(saldo);
        displaySaldo.style.color    = saldo < 0 ? '#c0392b' : '#2c3e50';
    }

    function salvarNoNavegador() {
        localStorage.setItem('entradasSalvas', totalEntradas);
        localStorage.setItem('saidasSalvas',   totalSaidas);
        localStorage.setItem('listaSalva',      JSON.stringify(listaMovimentacoes));
    }

    // ─── RECALCULA TOTAIS A PARTIR DA LISTA ───────
    // Garante que os totais fiquem sempre sincronizados após exclusão
    function recalcularTotais() {
        totalEntradas = 0;
        totalSaidas   = 0;
        listaMovimentacoes.forEach(mov => {
            if (mov.tipo === 'entrada') totalEntradas += mov.valor;
            else                        totalSaidas   += mov.valor;
        });
    }

    // ─── TABELA ───────────────────────────────────
    function carregarTabela() {
        tabelaHistorico.innerHTML = '';
        // Exibe do mais recente para o mais antigo
        [...listaMovimentacoes].reverse().forEach(function(mov, indexInvertido) {
            const indexReal = listaMovimentacoes.length - 1 - indexInvertido;
            const novaLinha  = document.createElement('tr');
            const badgeClass = mov.tipo === 'entrada' ? 'bg-green' : 'bg-red';
            const corTexto   = mov.tipo === 'entrada' ? 'text-green' : 'text-red';

            novaLinha.innerHTML = `
                <td>${formatarData(mov.data)}</td>
                <td>${mov.descricao}</td>
                <td><span class="badge ${badgeClass}">${mov.tipo === 'entrada' ? 'Entrada' : 'Saída'}</span></td>
                <td class="${corTexto}" style="font-weight:600">
                    ${mov.tipo === 'entrada' ? '+' : '−'} ${formatarMoeda(mov.valor)}
                </td>
                <td>
                    <button class="btn-excluir" title="Excluir lançamento" onclick="excluirMovimentacao(${indexReal})">🗑</button>
                </td>`;
            tabelaHistorico.appendChild(novaLinha);
        });
    }

    // ─── EXCLUIR LANÇAMENTO ───────────────────────
    function excluirMovimentacao(index) {
        if (!confirm('Deseja excluir este lançamento?')) return;
        listaMovimentacoes.splice(index, 1);
        recalcularTotais();
        atualizarPainel();
        carregarTabela();
        salvarNoNavegador();
    }

    // ─── FORMULÁRIO ───────────────────────────────
    form.addEventListener('submit', function(event) {
        event.preventDefault();
        const valor = parseFloat(valorInput.value);
        const tipo  = tipoInput.value;

        listaMovimentacoes.push({
            data:      dataInput.value,
            descricao: descInput.value,
            tipo:      tipo,
            valor:     valor
        });

        if (tipo === 'entrada') totalEntradas += valor;
        else                    totalSaidas   += valor;

        atualizarPainel();
        carregarTabela();
        salvarNoNavegador();
        form.reset();
    });

    // ─── RELATÓRIO DE MÉDIAS ──────────────────────
    function abrirRelatorio() {
        const modal    = document.getElementById('meuModal');
        const conteudo = document.getElementById('conteudoRelatorio');
        
        if (listaMovimentacoes.length === 0) {
            conteudo.innerHTML = "<p>Registre algumas vendas ou gastos primeiro para vermos sua média! 😊</p>";
            modal.style.display = "block";
            return;
        }

        const mesesUnicos       = [...new Set(listaMovimentacoes.map(m => m.data.substring(0, 7)))];
        const numMeses          = mesesUnicos.length;
        const mediaGanhos       = totalEntradas / numMeses;
        const mediaGastos       = totalSaidas   / numMeses;
        const lucroMedio        = mediaGanhos - mediaGastos;
        const corLucro          = lucroMedio >= 0 ? '#27ae60' : '#c0392b';
        const mensagemLucro     = lucroMedio >= 0
            ? "Parabéns! O ateliê está dando lucro. 💰"
            : "Atenção! Os gastos estão superando os ganhos. 😟";

        conteudo.innerHTML = `
            <p style="color:#7f8c8d;font-size:14px;margin-top:0">Analisando ${numMeses} mês(es) de registros:</p>
            <div class="resumo-item">
                <span style="font-size:14px;color:#7f8c8d">Média de Ganhos (Por Mês)</span><br>
                <strong style="color:#27ae60">${formatarMoeda(mediaGanhos)}</strong>
            </div>
            <div class="resumo-item">
                <span style="font-size:14px;color:#7f8c8d">Média de Gastos (Por Mês)</span><br>
                <strong style="color:#c0392b">${formatarMoeda(mediaGastos)}</strong>
            </div>
            <div class="lucro-final" style="background-color:${corLucro}22;color:${corLucro}">
                <span style="font-size:14px;font-weight:normal">Seu Lucro Médio Mensal é de:</span><br>
                <span style="font-size:28px">${formatarMoeda(lucroMedio)}</span><br>
                <span style="font-size:14px;font-weight:normal;display:block;margin-top:10px">${mensagemLucro}</span>
            </div>`;

        modal.style.display = "block";
    }

    function fecharRelatorio() {
        document.getElementById('meuModal').style.display = "none";
    }

    // ─── EXPORTAR EXCEL ───────────────────────────
    function exportarExcel() {
        if (listaMovimentacoes.length === 0) {
            alert('Nenhum lançamento para exportar. Registre movimentações primeiro!');
            return;
        }

        // Monta os dados da planilha
        const dados = listaMovimentacoes.map(mov => ({
            'Data':      formatarData(mov.data),
            'Descrição': mov.descricao,
            'Tipo':      mov.tipo === 'entrada' ? 'Entrada' : 'Saída',
            'Valor (R$)': mov.valor.toFixed(2).replace('.', ','),
        }));

        // Linha de totais no final
        dados.push({ 'Data': '', 'Descrição': '', 'Tipo': '', 'Valor (R$)': '' });
        dados.push({ 'Data': '', 'Descrição': 'TOTAL ENTRADAS', 'Tipo': '', 'Valor (R$)': totalEntradas.toFixed(2).replace('.', ',') });
        dados.push({ 'Data': '', 'Descrição': 'TOTAL SAÍDAS',   'Tipo': '', 'Valor (R$)': totalSaidas.toFixed(2).replace('.', ',') });
        dados.push({ 'Data': '', 'Descrição': 'SALDO GERAL',    'Tipo': '', 'Valor (R$)': (totalEntradas - totalSaidas).toFixed(2).replace('.', ',') });

        const ws = XLSX.utils.json_to_sheet(dados);

        // Ajusta largura das colunas
        ws['!cols'] = [
            { wch: 12 },
            { wch: 38 },
            { wch: 12 },
            { wch: 14 },
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Extrato Financeiro');

        // Nome do arquivo com data atual
        const hoje = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
        XLSX.writeFile(wb, `extrato_atelie_${hoje}.xlsx`);
    }

    // ─── INICIALIZAÇÃO ────────────────────────────
    atualizarPainel();
    carregarTabela();
</script>

</body>
</html>
